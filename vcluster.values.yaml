# vcluster chart values for hardmode session namespaces.
# 1) No PVC — emptyDir backing store. Session is ephemeral.
# 2) Pod/container SecurityContext meets PSA "restricted".
# 3) Resource requests/limits sized for the platform envelope.
# 4) RBAC stays namespace-only (no cluster-scope grants needed).

rbac:
  clusterRole:
    enabled: false
  enableVolumeSnapshotRules:
    enabled: false

controlPlane:
  # Embedded sqlite via kine — no etcd, no PVC.
  backingStore:
    database:
      embedded:
        enabled: true

  statefulSet:
    # Override the auto-PVC default; vcluster uses the empty-dir we
    # provide as its data dir.
    persistence:
      volumeClaim:
        enabled: false
      dataVolume:
        - name: data
          emptyDir: {}

    # Fit the platform per-container max (500m/512Mi).
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
        ephemeral-storage: 200Mi
      limits:
        cpu: 400m
        memory: 512Mi
        ephemeral-storage: 1Gi

    # PSA "restricted" compliance for the main syncer container + the
    # pod's overall security posture. The distro init container's
    # securityContext lives under controlPlane.distro.k8s.securityContext
    # below — it's a separate field.
    security:
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault

  # The distro init container ("kubernetes") doesn't honor
  # controlPlane.statefulSet.security; its securityContext lives here.
  distro:
    k8s:
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault

  # CoreDNS must fit the host namespace per-container envelope (500m
  # max). Chart default limits.cpu = 1000m which the host LimitRange
  # rejects → coredns pod stays Pending → in-vcluster DNS broken.
  coredns:
    deployment:
      resources:
        requests: {cpu: 20m, memory: 64Mi}
        limits:   {cpu: 200m, memory: 170Mi}
    # Leave coredns securityContext at the chart default. The official
    # /coredns binary won't exec as uid 65532 ("operation not
    # permitted"); the default user is fine under PSA baseline.
    # Tightening to restricted needs a coredns image that supports
    # non-root.
