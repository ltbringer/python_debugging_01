# Local-compose Prometheus config. Scrapes the sidecar's /metrics
# endpoint at a tight interval for fast feedback while iterating.
global:
  scrape_interval: 5s
  scrape_timeout: 4s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sidecar
    static_configs:
      - targets: ['sidecar:9091']
