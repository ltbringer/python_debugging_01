schema_version: "1"
category: cluster

images:
  fixtures:
    - name: wikipedia
      repository: ghcr.io/ltbringer/python_debugging_01-fixture
      tag: v0.3.0
  problems:
    - name: crawler
      repository: ghcr.io/h4rdm0d3/python_debugging_01
      tag: v1.1.0
  validator:
    repository: ghcr.io/ltbringer/python_debugging_01-validator
    tag: v0.3.0

session:
  exposed_services:
    - name: crawler
      port: 8080
      protocol: http
  idle_timeout_seconds: 600
  max_session_length_seconds: 7200

grade_output: progress

observability:
  dashboard: observability/grafana/sessions-shared.grafanacloud.json

sla:
  service: crawler
  endpoints:
    - method: POST
      path: /crawl
      request:
        urls: list[string]
        mode: string  # "batch" (default) or "stream"
      response:
        results: list[object]  # [{url, title, error?}]
        stats: object          # {instance_seen: list[string]}
    - method: GET
      path: /healthz
      response:
        ok: boolean
  # The validator owns the spec: ground-truth outputs are computed
  # from the fixture's catalog; performance bars are enforced inside
  # the platform-provisioned resource envelope. No behavioral
  # enumeration here.
